<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum Heist - Master the Quantum World</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Rajdhani',sans-serif;background:#000;overflow:hidden;width:100vw;height:100vh}
        #root{width:100%;height:100%}
        @keyframes flicker{0%,100%{opacity:1}50%{opacity:.8}}
        @keyframes pulse{0%,100%{transform:scale(1);opacity:.8}50%{transform:scale(1.05);opacity:1}}
        @keyframes scanline{0%{transform:translateY(-100%)}100%{transform:translateY(100vh)}}
        @keyframes glitch{0%{transform:translate(0)}20%{transform:translate(-2px,2px)}40%{transform:translate(-2px,-2px)}60%{transform:translate(2px,2px)}80%{transform:translate(2px,-2px)}100%{transform:translate(0)}}
        @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
        @keyframes particleFloat{0%{transform:translateY(0) translateX(0);opacity:0}10%{opacity:1}90%{opacity:1}100%{transform:translateY(-100px) translateX(20px);opacity:0}}
        @keyframes neonGlow{0%,100%{text-shadow:0 0 5px #0ff,0 0 10px #0ff,0 0 20px #0ff,0 0 40px #0ff}50%{text-shadow:0 0 10px #0ff,0 0 20px #0ff,0 0 40px #0ff,0 0 80px #0ff}}
        @keyframes expand{0%{transform:scale(.01);filter:blur(10px);opacity:0}50%{transform:scale(.5);filter:blur(2px);opacity:.5}100%{transform:scale(1);filter:blur(0);opacity:1}}
        @keyframes shrinkAnim{0%{transform:scale(1)}100%{transform:scale(.01);opacity:0}}
        @keyframes wavePulse{0%,100%{transform:scaleY(1)}50%{transform:scaleY(1.2)}}
        @keyframes platformGlow{0%,100%{box-shadow:0 0 20px rgba(0,255,255,.5)}50%{box-shadow:0 0 40px rgba(0,255,255,.8)}}
        .btn{font-family:'Orbitron',sans-serif;padding:15px 30px;background:transparent;border:2px solid #0ff;color:#0ff;cursor:pointer;transition:all .3s}
        .btn:hover{background:#0ff;color:#000}
    </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useCallback}=React;

// TITLE SCREEN
const TitleScreen=({onStart})=>{
    const[showPress,setShowPress]=useState(true);
    const particles=Array.from({length:40},(_,i)=>({id:i,x:Math.random()*100,y:Math.random()*100,size:Math.random()*4+2,delay:Math.random()*5,dur:Math.random()*3+2,color:Math.random()>.5?'#0ff':'#f0f'}));
    useEffect(()=>{const i=setInterval(()=>setShowPress(p=>!p),800);return()=>clearInterval(i)},[]);
    return(
        <div style={{width:'100vw',height:'100vh',background:'radial-gradient(ellipse at center,#1a0a2e 0%,#0d0015 50%,#000 100%)',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',position:'relative',overflow:'hidden',cursor:'pointer'}} onClick={onStart}>
            {particles.map(p=><div key={p.id} style={{position:'absolute',left:`${p.x}%`,top:`${p.y}%`,width:p.size,height:p.size,borderRadius:'50%',background:`radial-gradient(circle,${p.color},transparent)`,animation:`particleFloat ${p.dur}s ease-in-out ${p.delay}s infinite`,pointerEvents:'none'}}/>)}
            <div style={{position:'absolute',top:0,left:0,right:0,bottom:0,background:'repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,255,255,.03) 2px,rgba(0,255,255,.03) 4px)',pointerEvents:'none'}}/>
            <div style={{position:'absolute',top:0,left:0,right:0,height:'2px',background:'linear-gradient(90deg,transparent,#0ff,transparent)',animation:'scanline 3s linear infinite',pointerEvents:'none'}}/>
            <div style={{fontFamily:'Orbitron,sans-serif',fontSize:'clamp(40px,8vw,100px)',fontWeight:900,color:'#0ff',textShadow:'0 0 10px #0ff,0 0 20px #0ff,0 0 40px #0ff',letterSpacing:'.1em',animation:'neonGlow 2s ease-in-out infinite',zIndex:10}}>QUANTUM</div>
            <div style={{fontFamily:'Orbitron,sans-serif',fontSize:'clamp(50px,10vw,120px)',fontWeight:900,color:'#f0f',textShadow:'0 0 10px #f0f,0 0 20px #f0f,0 0 40px #f0f',letterSpacing:'.2em',marginTop:'-20px',zIndex:10}}>HEIST</div>
            <div style={{fontFamily:'Share Tech Mono,monospace',fontSize:'clamp(12px,2vw,18px)',color:'#0ff',marginTop:'30px',letterSpacing:'.3em',opacity:.8,zIndex:10}}>MASTER THE QUANTUM WORLD</div>
            <svg width="300" height="60" style={{marginTop:'40px',zIndex:10}}><path d="M0,30 Q37.5,10 75,30 T150,30 T225,30 T300,30" fill="none" stroke="url(#wg)" strokeWidth="2" style={{animation:'pulse 2s ease-in-out infinite'}}/><defs><linearGradient id="wg" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stopColor="#0ff"/><stop offset="50%" stopColor="#f0f"/><stop offset="100%" stopColor="#0ff"/></linearGradient></defs></svg>
            <div style={{fontFamily:'Rajdhani,sans-serif',fontSize:'clamp(16px,2.5vw,24px)',color:'#fff',marginTop:'60px',letterSpacing:'.2em',opacity:showPress?1:.3,transition:'opacity .3s',zIndex:10}}>[ CLICK ANYWHERE TO START ]</div>
            <div style={{position:'absolute',bottom:'20px',right:'20px',fontFamily:'Share Tech Mono,monospace',fontSize:'12px',color:'rgba(0,255,255,.5)',zIndex:10}}>v1.0 | QUANTUM PHYSICS LEARNING GAME</div>
        </div>
    );
};

// INTRO CINEMATIC
const IntroCinematic=({onComplete})=>{
    const[scene,setScene]=useState(0);
    const scenes=[
        {bg:'linear-gradient(180deg,#1a1a2e 0%,#0f0f1a 100%)',text:"QUANTUM CITY MUSEUM OF SCIENCE",sub:"11:47 PM",dur:3000},
        {bg:'linear-gradient(180deg,#0a0a15 0%,#000 100%)',text:"You are a master thief...",sub:"Tonight's target: The Quantum Reducer",dur:4000},
        {bg:'linear-gradient(180deg,#1a0a0a 0%,#0a0505 100%)',text:"Security bypassed. Laser grid disabled.",sub:"The device is within reach...",dur:3500},
        {bg:'radial-gradient(circle at 50% 50%,#4a0080 0%,#1a0030 30%,#000 70%)',text:"BUT SOMETHING GOES WRONG",sub:"The device activates...",dur:3000}
    ];
    useEffect(()=>{if(scene<scenes.length){const t=setTimeout(()=>{if(scene<scenes.length-1)setScene(s=>s+1);else onComplete();},scenes[scene].dur);return()=>clearTimeout(t)}},[scene]);
    const s=scenes[scene];
    return(
        <div style={{width:'100vw',height:'100vh',background:s.bg,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',transition:'background 1s',position:'relative',overflow:'hidden'}}>
            <div style={{position:'absolute',top:0,left:0,right:0,height:'60px',background:'#000'}}/>
            <div style={{position:'absolute',bottom:0,left:0,right:0,height:'60px',background:'#000'}}/>
            <div style={{fontFamily:'Orbitron,sans-serif',fontSize:scene===3?'clamp(24px,5vw,48px)':'clamp(20px,4vw,36px)',color:scene===3?'#f00':'#fff',textAlign:'center',textShadow:scene===3?'0 0 20px #f00':'0 0 10px rgba(255,255,255,.5)',animation:scene===3?'glitch .3s infinite':'none',letterSpacing:'.1em'}}>{s.text}</div>
            <div style={{fontFamily:'Rajdhani,sans-serif',fontSize:'clamp(14px,2vw,20px)',color:'rgba(255,255,255,.7)',marginTop:'20px',textAlign:'center'}}>{s.sub}</div>
            <div onClick={onComplete} style={{position:'absolute',bottom:'80px',right:'30px',fontFamily:'Share Tech Mono,monospace',fontSize:'14px',color:'rgba(255,255,255,.5)',cursor:'pointer',padding:'10px 20px',border:'1px solid rgba(255,255,255,.3)'}}>SKIP →</div>
        </div>
    );
};

// SHRINKING SEQUENCE
const ShrinkingSequence=({onComplete})=>{
    const[phase,setPhase]=useState(0);
    const atoms=Array.from({length:25},(_,i)=>({id:i,x:20+Math.random()*60,y:20+Math.random()*60,size:Math.random()*80+40,color:['#0ff','#f0f','#ff0','#0f0'][Math.floor(Math.random()*4)],delay:Math.random()*2}));
    useEffect(()=>{setTimeout(()=>setPhase(1),500);setTimeout(()=>setPhase(2),1500);setTimeout(()=>setPhase(3),3000);setTimeout(()=>setPhase(4),5000);setTimeout(onComplete,6000)},[]);
    return(
        <div style={{width:'100vw',height:'100vh',background:phase>=4?'#000':'radial-gradient(circle at 50% 50%,#8000ff 0%,#4000aa 20%,#200055 40%,#000 70%)',display:'flex',alignItems:'center',justifyContent:'center',position:'relative',overflow:'hidden',transition:'background 1s'}}>
            {phase>=1&&phase<4&&[1,2,3,4,5].map(i=><div key={i} style={{position:'absolute',width:`${i*150}px`,height:`${i*150}px`,border:`2px solid rgba(128,0,255,${.5-i*.08})`,borderRadius:'50%',animation:`pulse ${1+i*.2}s ease-in-out infinite`}}/>)}
            {phase>=2&&phase<4&&<div style={{width:'50px',height:'80px',background:'linear-gradient(180deg,#333,#111)',borderRadius:'25px 25px 10px 10px',animation:'shrinkAnim 3s forwards',position:'relative',zIndex:20}}><div style={{position:'absolute',top:'-30px',left:'5px',width:'40px',height:'40px',background:'#ddd',borderRadius:'50%'}}/></div>}
            {phase>=3&&phase<4&&atoms.map(a=><div key={a.id} style={{position:'absolute',left:`${a.x}%`,top:`${a.y}%`,width:a.size,height:a.size,borderRadius:'50%',background:`radial-gradient(circle at 30% 30%,${a.color},transparent 70%)`,border:`2px solid ${a.color}`,opacity:0,animation:`expand 1s ${a.delay}s forwards`,boxShadow:`0 0 30px ${a.color}`}}/>)}
            {phase>=2&&phase<4&&<div style={{position:'absolute',bottom:'100px',fontFamily:'Orbitron,sans-serif',fontSize:'clamp(16px,3vw,28px)',color:'#f0f',textShadow:'0 0 20px #f0f',animation:'pulse 1s infinite'}}>QUANTUM REDUCTION IN PROGRESS...</div>}
        </div>
    );
};

// WAKE UP
const WakeUpSequence=({onComplete})=>{
    const[phase,setPhase]=useState(0);
    const[blur,setBlur]=useState(20);
    useEffect(()=>{const i=setInterval(()=>setBlur(b=>Math.max(0,b-1)),100);setTimeout(()=>setPhase(1),1000);setTimeout(()=>setPhase(2),3000);setTimeout(onComplete,5000);return()=>clearInterval(i)},[]);
    const buildings=[{l:'5%',w:'8%',h:'60%'},{l:'15%',w:'12%',h:'80%'},{l:'30%',w:'15%',h:'100%'},{l:'48%',w:'10%',h:'70%'},{l:'60%',w:'18%',h:'90%'},{l:'80%',w:'15%',h:'75%'}];
    return(
        <div style={{width:'100vw',height:'100vh',background:'linear-gradient(180deg,#0a0020 0%,#1a0040 50%,#0a0020 100%)',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',filter:`blur(${blur}px)`,position:'relative',overflow:'hidden'}}>
            <div style={{position:'absolute',bottom:0,left:0,right:0,height:'40%',background:'linear-gradient(180deg,transparent,#0a0020)'}}>
                {buildings.map((b,i)=><div key={i} style={{position:'absolute',left:b.l,bottom:0,width:b.w,height:b.h,background:`linear-gradient(180deg,${i===2?'#0ff':i===4?'#f0f':'#333'},#111)`,borderRadius:'5px 5px 0 0',boxShadow:i===2||i===4?`0 0 30px ${i===2?'#0ff':'#f0f'}`:'none',opacity:.8}}/>)}
            </div>
            {phase>=1&&<div style={{fontFamily:'Orbitron,sans-serif',fontSize:'clamp(20px,4vw,40px)',color:'#fff',textShadow:'0 0 20px rgba(255,255,255,.5)',zIndex:10,animation:'pulse 2s infinite'}}>WELCOME TO QUANTUM CITY</div>}
            {phase>=2&&<div style={{fontFamily:'Rajdhani,sans-serif',fontSize:'clamp(14px,2vw,20px)',color:'rgba(255,255,255,.7)',marginTop:'20px',zIndex:10}}>Where classical physics no longer applies...</div>}
        </div>
    );
};

// MENTOR INTRO
const MentorIntro=({onComplete})=>{
    const[idx,setIdx]=useState(0);
    const[text,setText]=useState('');
    const[typing,setTyping]=useState(true);
    const dialogues=["Ah... you're awake. The quantum reducer shrunk you to particle scale.","I am Dr. Planck, your guide in this strange new world.","Here, you exist as a quantum entity. Probability clouds. Wave functions.","To return to normal size, master THREE DISTRICTS of Quantum City.","THE INFINITE TOWER - Learn about quantized energy states.","THE BORDERLANDS - Understand finite potential barriers.","THE TUNNEL NETWORK - Master quantum tunneling.","Your journey begins now. Head to the Infinite Tower first.","Remember... in this world, you cannot be certain of anything!"];
    useEffect(()=>{const d=dialogues[idx];let c=0;setTyping(true);setText('');const i=setInterval(()=>{if(c<d.length){setText(d.substring(0,c+1));c++}else{setTyping(false);clearInterval(i)}},30);return()=>clearInterval(i)},[idx]);
    const click=()=>{if(typing){setText(dialogues[idx]);setTyping(false)}else if(idx<dialogues.length-1)setIdx(i=>i+1);else onComplete()};
    return(
        <div style={{width:'100vw',height:'100vh',background:'linear-gradient(180deg,#0a0020 0%,#1a0040 50%,#0a0020 100%)',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'flex-end',position:'relative',cursor:'pointer',overflow:'hidden'}} onClick={click}>
            <div style={{position:'absolute',top:'15%',width:'200px',height:'300px',background:'linear-gradient(180deg,rgba(0,255,255,.1),rgba(0,255,255,.3),rgba(0,255,255,.1))',borderRadius:'100px 100px 50px 50px',animation:'float 3s ease-in-out infinite',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',border:'2px solid rgba(0,255,255,.5)',boxShadow:'0 0 50px rgba(0,255,255,.3)'}}>
                <div style={{width:'80px',height:'80px',borderRadius:'50%',background:'rgba(0,255,255,.3)',marginBottom:'20px',position:'relative'}}><div style={{position:'absolute',top:'30%',left:'20%',width:'15px',height:'15px',background:'#0ff',borderRadius:'50%',boxShadow:'0 0 10px #0ff'}}/><div style={{position:'absolute',top:'30%',right:'20%',width:'15px',height:'15px',background:'#0ff',borderRadius:'50%',boxShadow:'0 0 10px #0ff'}}/></div>
                <div style={{fontFamily:'Share Tech Mono,monospace',fontSize:'14px',color:'#0ff',textShadow:'0 0 10px #0ff'}}>DR. PLANCK</div>
            </div>
            <div style={{width:'80%',maxWidth:'800px',background:'rgba(0,0,0,.8)',border:'2px solid #0ff',borderRadius:'10px',padding:'30px',marginBottom:'50px',boxShadow:'0 0 30px rgba(0,255,255,.3)',position:'relative'}}>
                <div style={{position:'absolute',top:'-15px',left:'20px',background:'#0ff',color:'#000',padding:'5px 15px',fontFamily:'Orbitron,sans-serif',fontSize:'14px',fontWeight:700}}>DR. PLANCK</div>
                <div style={{fontFamily:'Rajdhani,sans-serif',fontSize:'clamp(16px,2.5vw,24px)',color:'#fff',lineHeight:1.6,minHeight:'60px'}}>{text}{typing&&<span style={{animation:'flicker 1s infinite'}}>▌</span>}</div>
                {!typing&&<div style={{position:'absolute',bottom:'10px',right:'20px',fontFamily:'Share Tech Mono,monospace',fontSize:'12px',color:'rgba(0,255,255,.7)',animation:'pulse 1s infinite'}}>{idx<dialogues.length-1?'[ CLICK TO CONTINUE ]':'[ CLICK TO BEGIN ]'}</div>}
            </div>
            <div style={{position:'absolute',bottom:'20px',display:'flex',gap:'10px'}}>{dialogues.map((_,i)=><div key={i} style={{width:'10px',height:'10px',borderRadius:'50%',background:i<=idx?'#0ff':'rgba(0,255,255,.3)',transition:'background .3s'}}/>)}</div>
        </div>
    );
};

// HUB WORLD
const HubWorld=({onSelectDistrict})=>{
    const[hover,setHover]=useState(null);
    const buildings=[
        {id:'infinite',name:'INFINITE TOWER',desc:'Master quantized energy states',x:15,y:20,w:22,h:50,color:'#0ff',avail:true,missions:['Elevator Job','Resonance Race','Energy Heist']},
        {id:'finite',name:'THE BORDERLANDS',desc:'Understand finite potential barriers',x:40,y:25,w:20,h:45,color:'#f0f',avail:false,missions:['Escape Compound','Two Prisons','Quantum Jailbreak']},
        {id:'tunnel',name:'TUNNEL NETWORK',desc:'Master quantum tunneling',x:65,y:30,w:20,h:40,color:'#ff0',avail:false,missions:['Impossible Passage','Tunnel Racing','The Vault']}
    ];
    return(
        <div style={{width:'100vw',height:'100vh',background:'linear-gradient(180deg,#0a0020 0%,#150030 30%,#1a0040 60%,#0a0020 100%)',position:'relative',overflow:'hidden'}}>
            {Array.from({length:80},(_,i)=><div key={i} style={{position:'absolute',left:`${Math.random()*100}%`,top:`${Math.random()*50}%`,width:Math.random()*3+1,height:Math.random()*3+1,background:'#fff',borderRadius:'50%',opacity:Math.random()*.5+.3,animation:`flicker ${Math.random()*3+1}s infinite`}}/>)}
            <div style={{position:'absolute',bottom:0,left:0,right:0,height:'30%',background:'linear-gradient(180deg,transparent,rgba(0,50,100,.3),rgba(0,30,60,.5))',borderTop:'2px solid rgba(0,255,255,.3)'}}>{Array.from({length:20},(_,i)=><div key={i} style={{position:'absolute',left:`${i*5}%`,top:0,bottom:0,width:'1px',background:'linear-gradient(180deg,rgba(0,255,255,.3),transparent)'}}/>)}</div>
            {buildings.map(b=>(
                <div key={b.id} style={{position:'absolute',left:`${b.x}%`,top:`${b.y}%`,width:`${b.w}%`,height:`${b.h}%`,cursor:b.avail?'pointer':'not-allowed',transition:'all .3s',transform:hover===b.id?'scale(1.05)':'scale(1)',filter:b.avail?'none':'grayscale(.7) brightness(.5)'}} onMouseEnter={()=>setHover(b.id)} onMouseLeave={()=>setHover(null)} onClick={()=>b.avail&&onSelectDistrict(b.id)}>
                    <div style={{width:'100%',height:'100%',background:`linear-gradient(180deg,${b.color}40,${b.color}20,#111)`,border:`2px solid ${b.color}`,borderRadius:'10px 10px 0 0',boxShadow:hover===b.id?`0 0 50px ${b.color}`:`0 0 20px ${b.color}40`,position:'relative',overflow:'hidden'}}>
                        <div style={{position:'absolute',top:'20%',left:'25%',width:'50%',height:'25%',background:'rgba(0,0,0,.8)',border:`2px solid ${b.color}`,borderRadius:'5px',display:'flex',alignItems:'center',justifyContent:'center'}}>
                            <div style={{width:'60%',height:'60%',borderRadius:'50%',border:`3px solid ${b.color}`,display:'flex',alignItems:'center',justifyContent:'center',animation:hover===b.id?'pulse 1s infinite':'none'}}><div style={{fontFamily:'Orbitron,sans-serif',fontSize:'clamp(12px,2vw,24px)',color:b.color,fontWeight:700}}>{b.id==='infinite'?'∞':b.id==='finite'?'V₀':'ψ'}</div></div>
                        </div>
                        <div style={{position:'absolute',top:'55%',left:'10%',right:'10%',bottom:'10%',display:'grid',gridTemplateColumns:'repeat(3,1fr)',gridTemplateRows:'repeat(3,1fr)',gap:'5%'}}>{Array.from({length:9},(_,i)=><div key={i} style={{background:`rgba(${b.color==='#0ff'?'0,255,255':b.color==='#f0f'?'255,0,255':'255,255,0'},${Math.random()*.3+.1})`,borderRadius:'2px',animation:Math.random()>.5?`flicker ${Math.random()*2+1}s infinite`:'none'}}/>)}</div>
                    </div>
                    <div style={{position:'absolute',bottom:'-40px',left:'50%',transform:'translateX(-50%)',fontFamily:'Orbitron,sans-serif',fontSize:'clamp(10px,1.5vw,16px)',color:b.color,textShadow:`0 0 10px ${b.color}`,whiteSpace:'nowrap',fontWeight:700}}>{b.name}</div>
                    {!b.avail&&<div style={{position:'absolute',top:'50%',left:'50%',transform:'translate(-50%,-50%)',fontSize:'40px',opacity:.8}}>🔒</div>}
                </div>
            ))}
            {hover&&<div style={{position:'absolute',top:'20px',right:'20px',width:'280px',background:'rgba(0,0,0,.9)',border:`2px solid ${buildings.find(b=>b.id===hover).color}`,borderRadius:'10px',padding:'20px',boxShadow:`0 0 30px ${buildings.find(b=>b.id===hover).color}40`}}>
                <div style={{fontFamily:'Orbitron,sans-serif',fontSize:'18px',color:buildings.find(b=>b.id===hover).color,marginBottom:'10px'}}>{buildings.find(b=>b.id===hover).name}</div>
                <div style={{fontFamily:'Rajdhani,sans-serif',fontSize:'14px',color:'#fff',marginBottom:'15px'}}>{buildings.find(b=>b.id===hover).desc}</div>
                <div style={{fontFamily:'Share Tech Mono,monospace',fontSize:'12px',color:'rgba(255,255,255,.7)'}}>MISSIONS:{buildings.find(b=>b.id===hover).missions.map((m,i)=><div key={i} style={{marginLeft:'10px',marginTop:'5px'}}>• {m}</div>)}</div>
                {!buildings.find(b=>b.id===hover).avail&&<div style={{marginTop:'15px',padding:'10px',background:'rgba(255,0,0,.2)',border:'1px solid #f00',borderRadius:'5px',fontFamily:'Share Tech Mono,monospace',fontSize:'12px',color:'#f00'}}>⚠ Complete Infinite Tower first</div>}
            </div>}
            <div style={{position:'absolute',top:'20px',left:'20px'}}><div style={{fontFamily:'Orbitron,sans-serif',fontSize:'clamp(16px,2.5vw,24px)',color:'#0ff',textShadow:'0 0 10px #0ff'}}>QUANTUM CITY</div><div style={{fontFamily:'Share Tech Mono,monospace',fontSize:'12px',color:'rgba(255,255,255,.7)'}}>Select a district to begin</div></div>
            <div style={{position:'absolute',bottom:'20px',left:'20px',background:'rgba(0,0,0,.8)',border:'1px solid #0ff',borderRadius:'5px',padding:'10px 20px',fontFamily:'Share Tech Mono,monospace',fontSize:'12px',color:'#0ff'}}>QUANTUM SCANNER: READY</div>
        </div>
    );
};

// ELEVATOR MISSION
const ElevatorMission=({onComplete,onBack})=>{
    const[phase,setPhase]=useState('intro');
    const[floor,setFloor]=useState(0);
    const[energy,setEnergy]=useState(0);
    const[msg,setMsg]=useState('');
    const[playerY,setPlayerY]=useState(80);
    const[jumping,setJumping]=useState(false);
    const[tutorial,setTutorial]=useState(true);
    const levels=[{n:1,y:80,e:1,c:'#ff4444'},{n:2,y:65,e:4,c:'#ff8800'},{n:3,y:50,e:9,c:'#ffff00'},{n:4,y:35,e:16,c:'#00ff00'},{n:5,y:20,e:25,c:'#00ffff'}];
    const[orbs,setOrbs]=useState([{id:1,f:1,x:30,col:false},{id:2,f:2,x:50,col:false},{id:3,f:2,x:70,col:false},{id:4,f:3,x:40,col:false},{id:5,f:4,x:60,col:false}]);
    
    const jump=(fi)=>{
        if(jumping)return;
        const tl=levels[fi];
        if(Math.abs(fi-floor)<=1||floor===0){
            setJumping(true);setFloor(fi);setPlayerY(tl.y);

            </div>
            <div style={{position:'absolute',left:'15%',right:'15%',top:'10%',bottom:'10%',border:'2px solid rgba(255,68,68,.5)',borderRadius:'10px',background:'rgba(0,0,0,.3)'}}>
                {security.map(z=><div key={z.id} style={{position:'absolute',left:0,right:0,top:`${z.y-7}%`,height:'14%',background:'repeating-linear-gradient(90deg,rgba(255,0,0,.1) 0px,rgba(255,0,0,.1) 20px,transparent 20px,transparent 40px)',borderTop:'2px dashed rgba(255,0,0,.5)',borderBottom:'2px dashed rgba(255,0,0,.5)'}}><div style={{position:'absolute',right:'10px',top:'50%',transform:'translateY(-50%)',fontFamily:'Share Tech Mono,monospace',fontSize:'10px',color:'#f00',background:'rgba(0,0,0,.8)',padding:'2px 5px',borderRadius:'3px'}}>SECURITY - Detects E > {z.n*z.n}E₁</div></div>)}
                <div style={{position:'absolute',top:'5%',left:'50%',transform:'translateX(-50%)',width:'60px',height:'60px',background:'radial-gradient(circle,#ff0,#f80,transparent 70%)',borderRadius:'50%',boxShadow:'0 0 50px #ff0',animation:'pulse 2s infinite',display:'flex',alignItems:'center',justifyContent:'center',fontFamily:'Orbitron,sans-serif',fontSize:'20px',color:'#000'}}>⚛</div>
            </div>
            {sources.map(s=><div key={s.id} onClick={()=>collect(s)} style={{position:'absolute',left:`${s.x}%`,top:`${s.y}%`,width:'40px',height:'40px',borderRadius:'50%',background:collected.includes(s.id)?'rgba(100,100,100,.3)':`radial-gradient(circle at 30% 30%,#fff,${colors[s.n-1]})`,border:`2px solid ${colors[s.n-1]}`,boxShadow:collected.includes(s.id)?'none':`0 0 20px ${colors[s.n-1]}`,cursor:collected.includes(s.id)?'default':'pointer',animation:collected.includes(s.id)?'none':'float 2s ease-in-out infinite',display:'flex',alignItems:'center',justifyContent:'center',fontFamily:'Share Tech Mono,monospace',fontSize:'10px',color:'#fff',transform:'translate(-50%,-50%)',opacity:collected.includes(s.id)?.3:1}}>{!collected.includes(s.id)&&`n=${s.n}`}</div>)}
            <div style={{position:'absolute',top:'80px',right:'20px',background:'rgba(0,0,0,.8)',border:'1px solid #ff4444',borderRadius:'10px',padding:'20px'}}>
                <div style={{fontFamily:'Orbitron,sans-serif',fontSize:'14px',color:'#ff4444',marginBottom:'10px'}}>ENERGY HEIST</div>
                <div style={{fontFamily:'Share Tech Mono,monospace',fontSize:'12px',color:'#fff'}}>Energy: {playerE} E₁<br/>Target: 16 E₁<br/>Collected: {collected.length}/5</div>
            </div>
            <div style={{position:'absolute',bottom:'20px',right:'20px',background:'rgba(0,0,0,.9)',border:'1px solid #ff0',borderRadius:'10px',padding:'15px'}}>
                <div style={{fontFamily:'Orbitron,sans-serif',fontSize:'12px',color:'#ff0',marginBottom:'10px'}}>ENERGY CALCULATOR</div>
                <div style={{display:'flex',gap:'10px',alignItems:'center'}}>
                    <span style={{color:'#fff',fontFamily:'Share Tech Mono',fontSize:'12px'}}>n =</span>
                    <input type="number" min="1" max="5" value={calcInput} onChange={e=>setCalcInput(e.target.value)} style={{width:'50px',padding:'5px',background:'#111',border:'1px solid #ff0',color:'#ff0',fontFamily:'Share Tech Mono',borderRadius:'3px'}}/>
                    <button onClick={calc} style={{padding:'5px 10px',background:'#ff0',border:'none',color:'#000',fontFamily:'Orbitron',fontSize:'10px',cursor:'pointer',borderRadius:'3px'}}>CALC</button>
                </div>
                <div style={{marginTop:'10px',fontFamily:'Share Tech Mono',fontSize:'10px',color:'rgba(255,255,255,.7)'}}>Eₙ = n² × E₁</div>
            </div>
            {msg&&<div style={{position:'absolute',top:'50%',left:'50%',transform:'translate(-50%,-50%)',background:msg.includes('⚠')?'rgba(255,0,0,.9)':'rgba(0,100,200,.9)',borderRadius:'10px',padding:'20px 40px',fontFamily:'Orbitron,sans-serif',fontSize:'16px',color:'#fff',zIndex:100}}>{msg}</div>}
            <div style={{position:'absolute',bottom:'20px',left:'20px',fontFamily:'Share Tech Mono,monospace',fontSize:'12px',color:'rgba(255,255,255,.7)',maxWidth:'300px'}}>Click energy orbs to collect. Avoid security with high energy!</div>
        </div>
    );
};

// MAIN GAME
const QuantumHeist=()=>{
    const[state,setState]=useState('title');
    const[mission,setMission]=useState(0);
    const start=()=>setState('intro');
    const introEnd=()=>setState('shrink');
    const shrinkEnd=()=>setState('wake');
    const wakeEnd=()=>setState('mentor');
    const mentorEnd=()=>setState('hub');
    const selectDist=(d)=>{if(d==='infinite'){setMission(1);setState('elevator')}};
    const missionDone=()=>{if(mission===1){setMission(2);setState('resonance')}else if(mission===2){setMission(3);setState('heist')}else setState('hub')};
    const backHub=()=>setState('hub');

    return(
        <div style={{width:'100vw',height:'100vh',overflow:'hidden'}}>
            {state==='title'&&<TitleScreen onStart={start}/>}
            {state==='intro'&&<IntroCinematic onComplete={introEnd}/>}
            {state==='shrink'&&<ShrinkingSequence onComplete={shrinkEnd}/>}
            {state==='wake'&&<WakeUpSequence onComplete={wakeEnd}/>}
            {state==='mentor'&&<MentorIntro onComplete={mentorEnd}/>}
            {state==='hub'&&<HubWorld onSelectDistrict={selectDist}/>}
            {state==='elevator'&&<ElevatorMission onComplete={missionDone} onBack={backHub}/>}
            {state==='resonance'&&<ResonanceMission onComplete={missionDone} onBack={backHub}/>}
            {state==='heist'&&<EnergyHeistMission onComplete={missionDone} onBack={backHub}/>}
        </div>
    );
};

ReactDOM.render(<QuantumHeist/>,document.getElementById('root'));
</script>
</body>
</html>
